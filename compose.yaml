services:
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/node/Dockerfile
      target: dev
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
  backend_php:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: .
      dockerfile: docker/backend/php/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
      target: build
    command: >
      sh -c "
      composer install &&
      php artisan migrate --force &&
      php-fpm"
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
    depends_on:
      - redis
  backend_node:
    build:
      context: .
      dockerfile: docker/backend/node/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
      target: build
    ports:
      - "5174:5174"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
      - /usr/src/app/vendor
    depends_on:
      - backend_php
  backend_nginx:
    build:
      context: .
      dockerfile: docker/backend/nginx/Dockerfile
      target: build
    ports:
      - "3000:80"
    volumes:
      - ./backend:/usr/share/nginx/html
      - /usr/share/nginx/html/node_modules
      - /usr/share/nginx/html/vendor
    depends_on:
      - backend_node
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5